<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#f472b6"/>
  <!-- Claw machine cabinet (simplified pixel art) -->
  <!-- Cabinet body -->
  <rect x="7" y="10" width="18" height="14" rx="2" fill="#fff" stroke="#ec4899" stroke-width="1.5"/>
  <!-- Claw hook -->
  <line x1="16" y1="7" x2="16" y2="12" stroke="#be185d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="12" x2="16" y2="15" stroke="#be185d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="12" x2="16" y2="15" stroke="#be185d" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Gift box inside machine -->
  <rect x="12" y="17" width="8" height="6" rx="1" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
  <line x1="16" y1="17" x2="16" y2="23" stroke="#f59e0b" stroke-width="1"/>
  <!-- Bow on gift -->
  <circle cx="16" cy="17" r="1.5" fill="#ef4444"/>
  <!-- Star sparkle -->
  <text x="6" y="10" font-size="5" fill="#facc15">★</text>
</svg>
